<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="calc" role="application" aria-label="Calculator">
      <div class="display" aria-live="polite">
        <div class="display-line" id="exprLine">
          <div class="display-scroll" id="exprScroll">
            <div class="expr" id="expr"></div>
          </div>
        </div>
        <div class="display-line" id="resultLine">
          <div class="display-scroll" id="resultScroll">
            <div class="result" id="result">0</div>
          </div>
        </div>
      </div>

      <div class="btns">
        <button type="button" class="btn fn danger" data-action="clear">AC</button>
        <button type="button" class="btn fn" data-action="delete">DEL</button>
        <button type="button" class="btn fn" data-action="pct">%</button>
        <button type="button" class="btn op" data-action="op" data-val="÷">÷</button>

        <button type="button" class="btn" data-action="num" data-val="7">7</button>
        <button type="button" class="btn" data-action="num" data-val="8">8</button>
        <button type="button" class="btn" data-action="num" data-val="9">9</button>
        <button type="button" class="btn op" data-action="op" data-val="×">×</button>

        <button type="button" class="btn" data-action="num" data-val="4">4</button>
        <button type="button" class="btn" data-action="num" data-val="5">5</button>
        <button type="button" class="btn" data-action="num" data-val="6">6</button>
        <button type="button" class="btn op" data-action="op" data-val="−">−</button>

        <button type="button" class="btn" data-action="num" data-val="1">1</button>
        <button type="button" class="btn" data-action="num" data-val="2">2</button>
        <button type="button" class="btn" data-action="num" data-val="3">3</button>
        <button type="button" class="btn op" data-action="op" data-val="+">+</button>

        <button type="button" class="btn zero" data-action="num" data-val="0">0</button>
        <button type="button" class="btn" data-action="dot">.</button>
        <button type="button" class="btn eq" data-action="equals">=</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
